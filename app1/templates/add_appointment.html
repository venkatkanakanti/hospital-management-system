<!DOCTYPE html>
<html>
<head>
<title>Add Appointment</title>

<style>
body{
font-family:Arial;
margin:0;
padding:0;
background:linear-gradient(135deg,#74ebd5,#9face6);
text-align:center;
}

.box{
background:white;
width:420px;
margin:auto;
margin-top:60px;
padding:30px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
color:#003366;
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:95%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#218838;
}

.back{
display:block;
margin-top:15px;
text-decoration:none;
color:#003366;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>📅 Book Appointment</h1>

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="patient_name" placeholder="Patient Name" required>

<input type="text" name="doctor_name" placeholder="Doctor Name" required>

<input type="date" name="date" required>

<input type="time" name="time" required>

<button type="submit">Book Appointment</button>

</form>

<a href="/adminlogin/" class="back">⬅ Back</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body{
            font-family:Arial;
            background: linear-gradient(to right,#667eea,#764ba2);
            text-align:center;
        }

        .login-box{
            background:white;
            width:350px;
            margin:auto;
            margin-top:120px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
            border-radius:8px;
            border:1px solid gray;
        }

        button{
            width:95%;
            padding:12px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        h1{
            color:#003366;
        }
    </style>
</head>

<body>

<div class="login-box">

<h1>🔐 Admin Login</h1>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Enter Username">

<input type="password" name="password" placeholder="Enter Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>

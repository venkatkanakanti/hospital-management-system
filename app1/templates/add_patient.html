<!DOCTYPE html>
<html>
<head>
<title>Add Patient</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#84fab0,#8fd3f4);
}

.form-box{
background:white;
width:420px;
padding:35px;
border-radius:20px;
box-shadow:0 12px 28px rgba(0,0,0,0.18);
text-align:center;
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(25px);}
to{opacity:1; transform:translateY(0);}
}

h1{
color:#003366;
margin-bottom:22px;
font-size:34px;
}

.msg-success{
color:green;
margin-bottom:10px;
font-weight:bold;
}

.msg-error{
color:red;
margin-bottom:10px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#00b894;
box-shadow:0 0 10px rgba(0,184,148,0.2);
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#28a745;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#218838;
transform:translateY(-2px);
box-shadow:0 10px 18px rgba(0,0,0,0.18);
}

.back{
display:inline-block;
margin-top:15px;
text-decoration:none;
color:#003366;
font-weight:bold;
}
</style>
</head>

<body>

<div class="form-box">

<h1>🧑 Add Patient</h1>

{% if success %}
<p class="msg-success">{{ success }}</p>
{% endif %}

{% if error %}
<p class="msg-error">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="name" placeholder="Patient Name" required>

<input type="text" name="age" placeholder="Age" required>

<input type="text" name="disease" placeholder="Disease" required>

<button type="submit">💾 Save Patient</button>

</form>

<a href="/dashboard/" class="back">⬅ Back to Dashboard</a>

</div>

</body>
</html>

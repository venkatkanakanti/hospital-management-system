<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <style>
        body{
            font-family:Arial;
            margin:0;
            padding:0;
            text-align:center;
            background: linear-gradient(to right,#c2e9fb,#a1c4fd);
        }

        .header{
            padding:40px;
        }

        h1{
            color:#003366;
            font-size:40px;
        }

        h3{
            color:#222;
        }

        .features{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:30px;
        }

        .card{
            background:white;
            width:220px;
            margin:15px;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 10px rgba(0,0,0,0.2);
        }

        button{
            padding:12px 20px;
            margin:15px;
            border:none;
            border-radius:8px;
            background:#4CAF50;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#45a049;
        }
    </style>
</head>

<body>

<div class="header">
<h1>🏥 Welcome to Hospital Management System</h1>
<h3>Your Health, Our Priority</h3>

<a href="/adminlogin/">
<button>🔐 Admin Login</button>
</a>
</div>

<div class="features">

<div class="card">
<h2>🚑 Ambulance</h2>
<p>24/7 Emergency Service</p>
</div>

<div class="card">
<h2>💊 Medicines</h2>
<p>All Essential Medicines Available</p>
</div>

<div class="card">
<h2>👨‍⚕️ Doctors</h2>
<p>Experienced Specialists</p>
</div>

<div class="card">
<h2>🧑 Patients</h2>
<p>Quality Care & Records</p>
</div>

<div class="card">
<h2>🛏️ Rooms</h2>
<p>Comfortable Rooms & Beds</p>
</div>

<div class="card">
<h2>📞 Support</h2>
<p>24/7 Help Desk</p>
</div>

</div>

</body>
</html>

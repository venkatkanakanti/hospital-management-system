<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
        }

        h1 {
            color: #003366;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 20px;
            margin: 15px;
            border-radius: 12px;
            width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px;
            width: 150px;
            border: none;
            border-radius: 6px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

<h1>🏥 Hospital Management Dashboard</h1>

<div class="container">

<div class="card">
<a href="/add_doctor/"><button>👨‍⚕️ Add Doctor</button></a>
</div>

<div class="card">
<a href="/add_patient/"><button>🧑 Add Patient</button></a>
</div>

<div class="card">
<a href="/view_doctors/"><button>📋 View Doctors</button></a>
</div>

<div class="card">
<a href="/view_patients/"><button>📄 View Patients</button></a>
</div>

<div class="card">
<a href="/logout/"><button>🚪 Logout</button></a>
</div>

</div>

</body>
</html>
